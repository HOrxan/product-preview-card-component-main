<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Fraunces:wght@700&display=swap"
      rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

    <title>Frontend Mentor | Product preview card component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      :root {
        /* # Front-end Style Guide */

        /* ## Layout */

        --mobile: 375px;
        --desktop: 1440px;
        /* ## Colors */

        /* ### Primary */

        --green-500: hsl(158, 36%, 37%);
        --green-700: hsl(158, 42%, 18%);

        /* ### Neutral */

        --black: hsl(212, 21%, 14%);
        --grey: hsl(228, 12%, 48%);
        --cream: hsl(30, 38%, 92%);
        --white: hsl(0, 0%, 100%);

        /* ## Typography */

        /* ### Body Copy */

        /* font-size */
        --paragraph: 14px;

        /* ### Font */
      }

      *,
      *::after,
      *::before {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: 'Montserrat', sans-serif;
        letter-spacing: -1%;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: var(--cream);
        padding: 10px;
      }

      main {
        display: flex;
        flex-direction: row;
        width: 540px;
        height: 405px;
      }

      section {
        width: 50%;
      }

      section img {
        border-top-left-radius: 5px;
        border-bottom-left-radius: 5px;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      article {
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 50%;
        padding: 30px 25px 0 25px;
        border-top-right-radius: 5px;
        border-bottom-right-radius: 5px;
        background-color: var(--white);
      }

      nav {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 20px;
      }

      nav img {
        width: 24px;
        height: 24px;
      }

      h1 {
        font-family: 'Fraunces', serif;
        color: var(--black);
        font-weight: 700;
        font-size: 31px;
      }

      h2 {
        font-family: 'Fraunces', serif;
        color: var(--green-500);
        font-size: 31px;
      }

      h3 {
        text-transform: uppercase;
        color: var(--grey);
        font-weight: 500;
        font-size: var(--paragraph);
        letter-spacing: 20%;
      }

      h4 {
        color: var(--grey);
        text-decoration: line-through;
      }

      p {
        font-size: var(--paragraph);
        font-weight: 500;
        color: var(--grey);
      }

      button {
        background-color: var(--green-700);
        color: var(--white);
        padding-block: 12px;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
      }

      button:hover {
        background-color: var(--green-500);
      }


      @media screen and (max-width: 600px) {
        main {
          flex-direction: column;
          align-items: center;
          justify-content: center;
        }

        section {
          width: 300px;
          height: 300px;
        }

        section img {
          border-bottom-left-radius: 0;
          border-top-right-radius: 5px;

        }

        article {
          border-top-right-radius: 0;
          border-bottom-left-radius: 5px;
          width: 300px;
        }
        button {
          margin-bottom: 30px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <img src="/images/image-product-desktop.jpg" alt="Perfume Picture">
      </section>
      <article>
        <h3>Perfume</h3>
        <h1>Gabrielle Essence Eau De Parfum</h1>
        <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator
          for the House of CHANEL.</p>
        <nav>
          <h2>$149.99</h2>
          <h4>$169.99</h4>
        </nav>
        <button type="button"><img src="/images/icon-cart.svg" alt=""> Add to Cart</button>
      </article>
    </main>
  </body>

</html>
